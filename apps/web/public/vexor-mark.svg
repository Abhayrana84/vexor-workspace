<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer V (lighter blue) -->
  <polyline
    points="8,16 32,44 56,16"
    stroke="url(#grad1)"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.55"
  />
  <!-- Inner V (bright cyan) -->
  <polyline
    points="16,16 32,36 48,16"
    stroke="url(#grad1)"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <defs>
    <linearGradient id="grad1" x1="8" y1="16" x2="56" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
</svg>
