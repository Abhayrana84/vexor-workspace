version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vexor-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vexor_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: vexor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  meilisearch:
    image: getmeili/meilisearch:v1.3
    container_name: vexor-meilisearch
    ports:
      - "7700:7700"
    environment:
      - MEILI_ENV=development
      - MEILI_MASTER_KEY=masterKey
    volumes:
      - meili_data:/meili_data
    restart: always

volumes:
  postgres_data:
  redis_data:
  meili_data:
